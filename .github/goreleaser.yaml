version: 2

# Configuration for compiling executable binaries automatically
builds:
  - id: "multi-binary-build"
    env:
      - CGO_ENABLED=0 # Disables CGO to generate highly portable static binaries
    goos:
      - linux
      - windows
      - darwin # macOS
    goarch:
      - amd64
      - arm64 # Native support for Apple Silicon and ARM servers
    main: ./...

# Packaging configuration for distribution downloads
archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    # Uses .Binary to automatically name each zip with the respective command name
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README*
      - LICENSE*
      - CHANGELOG*
